<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Clone AI Studio</title>
    <style>
        :root {
            --bg-main: #0B0A0F;
            --bg-card: #15131C;
            --primary: #8B5CF6;
            --primary-hover: #7C3AED;
            --success: #10B981;
            --danger: #EF4444;
            --text: #F3F4F6;
            --text-muted: #9CA3AF;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-main); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .dashboard { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 20px; }
        header { text-align: center; margin-bottom: 10px; }
        header h1 { font-size: 26px; margin: 0; background: linear-gradient(135deg, #A78BFA, #8B5CF6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .card { background-color: var(--bg-card); border: 1px solid #262430; border-radius: 16px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .info-row { display: flex; justify-content: space-between; background: rgba(255,255,255,0.02); padding: 12px; border-radius: 10px; font-size: 14px; margin-bottom: 8px; }
        .info-label { color: var(--text-muted); }
        .info-value { font-family: monospace; color: #E9D5FF; font-weight: bold; }
        input[type="file"] { width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 2px dashed #443E54; border-radius: 10px; color: var(--text-muted); box-sizing: border-box; margin-bottom: 18px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-hover)); color: white; }
        .btn-success { background: #059669; color: white; margin-bottom: 12px; }
        .btn-danger { background: #DC2626; color: white; }
        button:disabled { background: #23212C !important; color: #524E61 !important; cursor: not-allowed; }
        .status-box { margin-top: 14px; text-align: center; font-size: 13px; color: #FBBF24; font-weight: 500; }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>RVC Internal Dashboard</h1>
            <p>Direct Container-Hosted Control Panel</p>
        </header>

        <div class="card">
            <h3>🔒 Active Target Identity</h3>
            <div class="info-row"><span class="info-label">User ID:</span><span class="info-value">user_phone_tester_777</span></div>
            <div class="info-row"><span class="info-label">Voice:</span><span class="info-value">Deep_Voice_Filter</span></div>
        </div>

        <div class="card">
            <h3>🎙️ Step 1: Clone New Voice Profile</h3>
            <input type="file" id="audioFile" accept="audio/*">
            <button class="btn-primary" id="btnTrain" onclick="uploadAndTrain()">Upload & Register Voice</button>
            <div class="status-box" id="trainStatus">Container ready</div>
        </div>

        <div class="card">
            <h3>⚡ Step 2: Live Conversation Stream</h3>
            <button class="btn-success" id="btnStart" onclick="startAudioStream()">Start Streaming Session</button>
            <button class="btn-danger" id="btnStop" onclick="stopAudioStream()" disabled>Disconnect Stream</button>
            <div class="status-box" id="streamStatus">Stream inactive</div>
        </div>
    </div>

    <script>
        // Dynamically compute paths based on the container's active URL location
        const host = window.location.host;
        const protocol = window.location.protocol;
        const wsProtocol = protocol === 'https:' ? 'wss:' : 'ws:';

        const trainingUrl = `${protocol}//${host}/train`;
        const streamingWsUrl = `${wsProtocol}//${host}/ws`;
        
        const userId = "user_phone_tester_777";
        const voiceName = "Deep_Voice_Filter";

        let audioContext = null;
        let socket = null;
        let micStream = null;

        async function uploadAndTrain() {
            const fileInput = document.getElementById("audioFile");
            const statusDiv = document.getElementById("trainStatus");
            const trainBtn = document.getElementById("btnTrain");
            
            if (!fileInput.files[0]) {
                statusDiv.innerText = "Select an audio file first.";
                return;
            }

            trainBtn.disabled = true;
            statusDiv.innerText = "Converting audio to array matrix...";
            
            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.readAsDataURL(file);
            reader.onloadend = async () => {
                const base64Audio = reader.result.split(',')[1];
                statusDiv.innerText = "Processing inside container...";

                try {
                    const response = await fetch(trainingUrl, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ user_id: userId, voice_name: voiceName, audio: base64Audio })
                    });
                    
                    const result = await response.json();
                    if (!response.ok) throw new Error(result.detail || "Processing error.");
                    
                    statusDiv.style.color = "#10B981";
                    statusDiv.innerText = "Success! Voice profile saved to volume.";
                } catch (err) {
                    statusDiv.style.color = "#EF4444";
                    statusDiv.innerText = "Error: " + err.message;
                } finally {
                    trainBtn.disabled = false;
                }
            };
        }

        async function startAudioStream() {
            document.getElementById("btnStart").disabled = true;
            document.getElementById("btnStop").disabled = false;
            const statusDiv = document.getElementById("streamStatus");
            statusDiv.innerText = "Connecting local WebSockets matrix...";

            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 40000 });
            socket = new WebSocket(streamingWsUrl);

            socket.onopen = async () => {
                statusDiv.style.color = "#10B981";
                statusDiv.innerText = "Live stream active! Speak now.";
                
                micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
                const source = audioContext.createMediaStreamSource(micStream);
                const processor = audioContext.createScriptProcessor(2048, 1, 1);

                source.connect(processor);
                processor.connect(audioContext.destination);

                processor.onaudioprocess = (e) => {
                    const inputBuffer = e.inputBuffer.getChannelData(0);
                    const base64Chunk = btoa(String.fromCharCode.apply(null, new Uint8Array(inputBuffer.buffer)));
                    if (socket.readyState === WebSocket.OPEN) {
                        socket.send(JSON.stringify({ user_id: userId, voice_name: voiceName, audio_chunk: base64Chunk }));
                    }
                };
            };

            socket.onmessage = (e) => {
                const responseData = JSON.parse(e.data);
                const arrayBuffer = Uint8Array.from(atob(responseData.audio_chunk), c => c.charCodeAt(0)).buffer;
                const float32Output = new Float32Array(arrayBuffer);

                const buffer = audioContext.createBuffer(1, float32Output.length, 40000);
                buffer.copyToChannel(float32Output, 0);
                const sourceNode = audioContext.createBufferSource();
                sourceNode.buffer = buffer;
                sourceNode.connect(audioContext.destination);
                sourceNode.start();
            };

            socket.onclose = () => {
                statusDiv.style.color = "#9CA3AF";
                statusDiv.innerText = "Stream disconnected cleanly.";
                document.getElementById("btnStart").disabled = false;
                document.getElementById("btnStop").disabled = true;
            };
        }

        function stopAudioStream() {
            if (socket) socket.close();
            if (micStream) micStream.getTracks().forEach(track => track.stop());
            if (audioContext) audioContext.close();
        }
    </script>
</body>
</html>
